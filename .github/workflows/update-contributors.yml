# Refreshes the contributor roster artifact (src/data/contributors.json) as @elixpoo.
# Fetches contributors from the source repo (elixpo_chapter) and commits the list
# back to this repo on main, where it is served raw and read live by the site.
#
# Triggers:
#   - schedule          → daily refresh
#   - workflow_dispatch → manual run / initial seed

name: Update Contributors Roster

concurrency:
  group: update-contributors
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update contributors artifact
        env:
          AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          TARGET_REPO: ${{ github.repository }}
          CONTRIB_SOURCE_REPO: elixpo/elixpo_chapter
        run: python .github/scripts/update_contributors.py
